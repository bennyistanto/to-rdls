# ---------------------------------------------------------------------------
# INTENSITY MEASURE DEFINITIONS
# Full catalog of IM codes with title and description.
# 108 entries from intensity_measure_definitions in schema.
# ---------------------------------------------------------------------------
intensity_measure_definitions:
  "PGA:g":
    title: "Peak ground acceleration in g"
    description: "The largest increase in velocity recorded at a particular location during an earthquake. Expressed in g-force."
  "PGA:gal":
    title: "Peak ground acceleration in gal"
    description: "Peak ground acceleration expressed in gal (1 gal = 0.01 m/s²)."
  "PGA:m/s2":
    title: "Peak ground acceleration in m/s²"
    description: "Peak ground acceleration expressed in meters per second squared."
  "PGV:m/s":
    title: "Peak ground velocity in m/s"
    description: "The greatest speed of ground shaking during an earthquake."
  "PGV:cm/s":
    title: "Peak ground velocity in cm/s"
    description: "Peak ground velocity expressed in centimeters per second."
  "AvgSa:m/s2":
    title: "Average spectral acceleration (m/s2)"
    description: "Mean spectral acceleration at periods crucial for risk assessment."
  "Sa_1:m/s2":
    title: "Spectral acceleration (1 sec) (m/s2)"
    description: "Spectral acceleration at 1-second period."
  "Sa_03:m/s2":
    title: "Spectral acceleration (0.3 sec) (m/s2)"
    description: "Spectral acceleration at 0.3-second period."
  "Sd(T1):m":
    title: "Spectral displacement (m)"
    description: "Maximum displacement of structure at fundamental period."
  "Sv(T1):m/s":
    title: "Spectral velocity (m/s)"
    description: "Maximum velocity of structure at fundamental period."
  "PGDf:m":
    title: "Permanent ground deformation (m)"
    description: "Displacement of ground surface due to fault movement."
  "D:s":
    title: "Significant duration (s)"
    description: "Time interval of strong ground shaking."
  "D_B:s":
    title: "Bracketed duration (s)"
    description: "Time between first and last threshold exceedances."
  "IA:m/s":
    title: "Arias intensity (m/s)"
    description: "Measure of ground motion strength."
  "Neq:-":
    title: "Effective number of cycles"
    description: "Relationship between cycle count and damage potential."
  "CAV:m/s":
    title: "Cumulative absolute velocity (m/s)"
    description: "Integrated absolute acceleration over earthquake duration."
  "MMI:-":
    title: "Modified Mercalli Intensity"
    description: "Seismic intensity scale from I (Not felt) to X (Extreme)."
  "EMS:-":
    title: "European Macroseismic Scale"
    description: "Seismic intensity scale from I (Not felt) to XII (Completely devastating)."
  "wd:m":
    title: "Inundation depth above ground (m)"
    description: "Inundation depth measured relative to ground level. Expressed in meters (m)."
  "wd:cm":
    title: "Inundation depth above ground (cm)"
    description: "Inundation depth measured relative to ground level. Expressed in centimeters (cm)."
  "wd:dm":
    title: "Inundation depth above ground (dm)"
    description: "Inundation depth measured relative to ground level. Expressed in decimeters (dm)."
  "wd_f:m":
    title: "Inundation depth above floor (m)"
    description: "Inundation depth measured relative to building floor level. Expressed in meters (m)."
  "wd_f:cm":
    title: "Inundation depth above floor (cm)"
    description: "Inundation depth measured relative to building floor level. Expressed in centimeters (cm)."
  "wd_f:dm":
    title: "Inundation depth above floor (dm)"
    description: "Inundation depth measured relative to building floor level. Expressed in decimeters (dm)."
  "wv:m/s":
    title: "Flow velocity (m/s)"
    description: "The rate at which a fluid flows in a flood, tsunami, landslide, lahar, debris flow or other. Expressed in meters per second (m/s)."
  "slr:cm":
    title: "Sea level rise (cm)"
    description: "Long-term rise in sea level affecting coastal hazards."
  "pptn1:mm":
    title: "1-hour precipitation (mm)"
    description: "Maximum rainfall depth in any 1-hour period."
  "pptn24:mm":
    title: "24-hour precipitation (mm)"
    description: "Maximum rainfall depth in any 24-hour period."
  "pptn_tot:mm":
    title: "Total event precipitation (mm)"
    description: "Total cumulative precipitation for entire event."
  "Rh_tsi:m":
    title: "Tsunami wave runup height (m)"
    description: "Maximum elevation reached by tsunami waves on land."
  "h_tsi:m":
    title: "Tsunami inundation height (m)"
    description: "Height of tsunami water above ground level."
  "Fh_tsi:m":
    title: "Tsunami horizontal force (m)"
    description: "Lateral force exerted by tsunami."
  "F_drag:kN":
    title: "Hydrodynamic drag force (kN)"
    description: "Drag force exerted by flowing water on structures."
  "F_QS:kN":
    title: "Quasi-static buoyant force (kN)"
    description: "Buoyant force during low-velocity inundation."
  "MF:m3/s2":
    title: "Momentum flux (m3/s2)"
    description: "Product of flow depth and velocity squared."
  "MMF:m4/s2":
    title: "Modified momentum flux (m4/s2)"
    description: "Product of momentum flux and inundation depth."
  "Fr:-":
    title: "Froude number"
    description: "Flow velocity non-dimensionalized by gravity-wave velocity."
  "sws_3s:km/h":
    title: "3-sec sustained wind speed (km/h)"
    description: "The average speed of the wind over a 3-second time period, measured at a height of 10 meters (about 33 feet) above the ground or sea surface. Expressed in kilometers per hour (kph)."
  "sws_1m:km/h":
    title: "1-min sustained wind speed (km/h)"
    description: "The average speed of the wind over a 1-minute time period, measured at a height of 10 meters (about 33 feet) above the ground or sea surface. Expressed in kilometers per hour (kph)."
  "sws_10m:m/s":
    title: "10-min sustained wind speed (m/s)"
    description: "The average wind speed over a period of 10 minutes. Expressed in meters per second (m/s)."
  "sws_10m:km/h":
    title: "10-min sustained wind speed (km/h)"
    description: "The average wind speed over a period of 10 minutes. Expressed in kilometers per hour (kph)."
  "PGWS:km/h":
    title: "Peak gust wind speed (km/h)"
    description: "The peak gust wind speed in the open terrain. Expressed in kilometers per hour (kph)."
  "PGWS:mph":
    title: "Peak gust wind speed (mph)"
    description: "Direct wind speed estimate used in engineering and insurance modeling."
  "PGWS:m/s":
    title: "Peak gust wind speed (m/s)"
    description: "The peak gust wind speed in the open terrain. Expressed in meters per second (m/s)."
  "MSLP:mbar":
    title: "Minimum sea level pressure (mbar)"
    description: "Atmospheric pressure in millibars (tropical cyclone intensity)."
  "MSLP:hPa":
    title: "Minimum sea level pressure (hPa)"
    description: "Atmospheric pressure in hectopascals."
  "EF:-":
    title: "Enhanced Fujita Scale"
    description: "Tornado intensity from EF0 to EF5 based on damage."
  "TPL:m":
    title: "Tornado path length (m)"
    description: "Distance traveled by tornado along its path."
  "TPW:m":
    title: "Tornado path width (m)"
    description: "Maximum width of tornado damage path."
  "TD:":
    title: "Tornado Duration"
    description: "Time duration of tornado connection to ground."
  "HSI:-":
    title: "Hail Severity Index"
    description: "Composite hail index for insurance and risk modeling."
  "HlMaxSz:mm":
    title: "Maximum hail size (mm)"
    description: "Largest hailstone diameter observed."
  "HlD:mm":
    title: "Hailstone diameter (mm)"
    description: "Most common hail metric for severity assessment."
  "HlProb:%":
    title: "Severe hail probability (%)"
    description: "Likelihood of hail exceeding certain size threshold."
  "HlKE:J/m2":
    title: "Hail kinetic energy (J/m2)"
    description: "Energy per unit area for crop and roof damage assessment."
  "ImpactE:J":
    title: "Impact energy (J)"
    description: "Energy released upon impact (ballistics, hail)."
  "ImpactE:kJ":
    title: "Impact energy (kJ)"
    description: "Impact energy in kilojoules."
  "SPI:-":
    title: "Standard Precipitation Index"
    description: "Meteorological drought index across multiple timescales."
  "SPEI:-":
    title: "Standard Precipitation Evapotranspiration Index"
    description: "Drought index incorporating temperature effects."
  "PDSI:-":
    title: "Palmer Drought Severity Index"
    description: "Long-term drought index spanning -10 (dry) to +10 (wet)."
  "CMI:-":
    title: "Crop Moisture Index"
    description: "Short-term agricultural drought or moisture surplus indicator."
  "NDVI:-":
    title: "Normalized Difference Vegetation Index"
    description: "Satellite-derived measure of vegetation health and biomass."
  "VCI:-":
    title: "Vegetation Condition Index"
    description: "Current vegetation health vs. historical trends."
  "VHI:-":
    title: "Vegetation Health Index"
    description: "Composite index combining VCI and temperature effects."
  "ASI:%":
    title: "Agricultural Stress Index (%)"
    description: "Indicator for early identification of water-stressed cropland."
  "WMVHI:-":
    title: "Weighted Mean Vegetation Health Index"
    description: "Drought severity assessment from growing season start."
  "DI:-":
    title: "Drought Intensity"
    description: "Classification: Extreme, Severe, Moderate, or Mild."
  "DMC:-":
    title: "U.S. Drought Monitor Categories"
    description: "Scale from D0 (Abnormally Dry) to D4 (Exceptional Drought)."
  "PNP:%":
    title: "Percent of Normal Precipitation (%)"
    description: "Current precipitation compared to historical average."
  "SMA:-":
    title: "Soil Moisture Anomaly"
    description: "Deviation from normal soil moisture levels."
  "SA:%":
    title: "Streamflow Percentile (%)"
    description: "Current streamflow compared to historical records."
  "DSCI:-":
    title: "Drought Severity and Coverage Index"
    description: "Continuous severity index on scale 0-500."
  "EDDI:-":
    title: "Evaporative Demand Drought Index"
    description: "Quantifies atmospheric water demand from land surface."
  "AirTemp:C":
    title: "Air temperature (°C)"
    description: "Ambient air temperature in Celsius."
  "AirTemp:F":
    title: "Air temperature (°F)"
    description: "Ambient air temperature in Fahrenheit."
  "WBGT:C":
    title: "Wet Bulb Globe Temperature (C)"
    description: "Heat stress index incorporating temperature, humidity, wind, and solar radiation."
  "WBT:C":
    title: "Wet Bulb Temperature (C)"
    description: "Temperature at which sweat no longer evaporates efficiently."
  "HI:-":
    title: "Heat Index"
    description: "Apparent temperature combining air temperature and humidity."
  "EHF:-":
    title: "Excess Heat Factor"
    description: "Heatwave severity based on temperature anomalies."
  "CDD:-":
    title: "Cooling Degree Days"
    description: "Measures energy demand for cooling buildings."
  "AT:-":
    title: "Apparent Temperature"
    description: "Perceived temperature based on humidity and wind (similar to heat index)."
  "HD:-":
    title: "Number of Hot Days"
    description: "Days exceeding a threshold (e.g. >35°C)."
  "ls_fd:m":
    title: "Landslide flow depth (m)"
    description: "Depth of landslide flow in meters."
  "ls_mfd:m":
    title: "Maximum foundation displacement (m)"
    description: "Maximum foundation displacement due to landslide."
  "SD_lsl:m":
    title: "Landslide displacement (m)"
    description: "Displacement associated with slow-moving landslides."
  "I_DF:m3/s2":
    title: "Debris-flow intensity index (m3/s2)"
    description: "Landslide intensity index (Jakob et al. 2012)."
  "rf_KE:kJ":
    title: "Rockfall kinetic energy (kJ)"
    description: "Kinetic energy of rockfall as function of mass and velocity."
  "IP:kPa":
    title: "Impact Pressure (kPa)"
    description: "Force exerted by avalanche on objects; used in structural and hazard analysis, in kPa (kilopascal)."
  "LSI:-":
    title: "Landslide Susceptibility Index"
    description: "Probability based on terrain and environmental factors."
  "DP:-":
    title: "Destructive Potential"
    description: "Classification based on observed or expected damage."
  "PE:% of slope area":
    title: "Planimetric Extent (% of slope area)"
    description: "Proportion of a slope affected by landslides; used in intensity modeling."
  "Rdist:m":
    title: "Runout distance (m)"
    description: "Horizontal distance traveled downslope."
  "Vol:m3":
    title: "Volume (m3)"
    description: "Total volume of material involved."
  "h_vaf:mm":
    title: "Volcanic ash fall thickness (mm)"
    description: "Accumulated depth of ash following eruption."
  "L_vaf:kg/m2":
    title: "Volcanic ash loading (kg/m2)"
    description: "Load of accumulated ash per unit area."
  "vei:-":
    title: "Volcanic Explosivity Index"
    description: "Logarithmic scale of eruption explosiveness."
  "Vbal_size:m":
    title: "Volcanic ballistic size (m)"
    description: "Diameter of volcanic projectiles."
  "Vbal_Lprob:%":
    title: "Ballistic landing probability (%)"
    description: "Likelihood of ballistic landing in given area."
  "Vbal_MaxRng:km":
    title: "Maximum ballistic range (km)"
    description: "Maximum distance ballistics can reach from vent."
  "BA:ha":
    title: "Burned Area (ha)"
    description: "Surface area impacted by the hazard. Described in square kilometers."
  "BA:km2":
    title: "Burned Area (km²)"
    description: "Surface area impacted by the hazard. Described in square kilometers."
  "FWI:-":
    title: "Fire Weather Index"
    description: "Meteorological fire danger index."
  "AA:m2":
    title: "Area Affected (m²)"
    description: "Surface area impacted by the hazard. Described in square meters."
  "AA:km2":
    title: "Area Affected (km²)"
    description: "Surface area impacted by the hazard. Described in square kilometers."
  "riskidx:-":
    title: "Risk score"
    description: "Composite risk quantification."
  "MHI:-":
    title: "Multi-Hazard Index"
    description: "Index describing prevalence of multiple hazards."
  "EvArea:events/km²":
    title: "Event Density - Count per Unit Area (events/km²)"
    description: "Number of events in a unit area, e.g. count of landslide, rockfall, volcanic ballistics/projectiles, tornadoes in a km2."
  "EvYr:events/year":
    title: "Event Frequency - Count per Year (events/year)"
    description: "Number of events in a year"

