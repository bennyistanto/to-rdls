# ---------------------------------------------------------------------------
# OBJECT REQUIRED FIELDS (from $defs)
# Structural requirements for every named object type in the schema.
# ---------------------------------------------------------------------------
object_required_fields:

  Dataset:
    required:
      - id
      - title
      - risk_data_type
      - attributions
      - spatial
      - license
      - resources
    attributions_required_roles:
      - publisher
      - creator
      - contact_point

  Resource:
    required:
      - id
      - title
      - description
      - data_format
    anyOf:
      - required: [download_url]
      - required: [access_url]
    properties:
      - id
      - title
      - description
      - data_format
      - access_modality
      - spatial_resolution
      - coordinate_system
      - access_url
      - download_url
      - temporal

  Attribution:
    required:
      - id
      - entity
      - role
    properties:
      - id
      - entity
      - role

  Entity:
    required:
      - name
    anyOf:
      - required: [email]
      - required: [url]
    properties:
      - name
      - email
      - url

  Event_set:
    required:
      - id
      - hazards
      - analysis_type
    properties:
      - id
      - hazards
      - analysis_type
      - frequency_distribution
      - seasonality
      - calculation_method
      - event_count
      - occurrence_range
      - events

  Event:
    required:
      - id
      - calculation_method
      - hazard
      - occurrence
    properties:
      - id
      - disaster_identifiers
      - calculation_method
      - hazard
      - occurrence
      - description

  Hazard:
