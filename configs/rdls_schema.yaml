# =============================================================================
# RDLS v0.3 Schema Codelists & Structural Requirements
# =============================================================================
# Source: rdls_schema_v0.3.json
# These are the RDLS-specific values — independent of any data source.
# Closed codelists must be matched exactly; open codelists are extensible.
# =============================================================================

version: "0.3"

# ---------------------------------------------------------------------------
# REQUIRED FIELDS (at dataset level)
# ---------------------------------------------------------------------------
required_fields:
  - id
  - title
  - risk_data_type
  - attributions
  - spatial
  - license
  - resources

required_attribution_roles:
  - publisher
  - creator
  - contact_point

required_resource_fields:
  - id
  - title
  - data_format
  - access_modality

# ---------------------------------------------------------------------------
# CLOSED CODELISTS (strict — must match exactly)
# ---------------------------------------------------------------------------
