# =============================================================================
# RDLS Record Naming Convention Configuration
# =============================================================================
# Defines the structure of RDLS record IDs and JSON filenames:
#   rdls_{types}-{iso3}{org}_{titleslug}_{items}.json
#
# - types:     Component codes (single: hzd/exp/vln/lss, multi: h/e/v/l concat)
# - iso3:      Lowercase ISO3 codes concatenated (3-char fixed width, sorted)
# - org:       Org abbreviation appended after ISO3 (from lookup or auto-truncate)
# - titleslug: Slugified dataset title (stop words + country + org removed, max 20)
# - items:     2-char hazard/exposure item codes concatenated
# =============================================================================

# ---------------------------------------------------------------------------
# Component type encoding
# Single component  → 3-letter code (hzd, exp, vln, lss)
# Multiple components → single-letter concatenation in HEVL order
# ---------------------------------------------------------------------------
component_codes:
  single:
    hazard: hzd
    exposure: exp
    vulnerability: vln
    loss: lss
  letter:
    hazard: h
    exposure: e
    vulnerability: v
    loss: l
  # Canonical order for multi-component letter concatenation
  order:
    - hazard
    - exposure
    - vulnerability
    - loss

# ---------------------------------------------------------------------------
# Hazard type → 2-char item code
# All codes are exactly 2 characters, concatenated without separator
# ---------------------------------------------------------------------------
hazard_item_codes:
  flood: fl
  earthquake: eq
  tsunami: ts
  strong_wind: tc       # tropical cyclone / strong wind
  volcanic: vo
  landslide: ls
  convective_storm: cs
  wildfire: wf
  drought: dr
  extreme_temperature: et
  coastal_flood: cf

# ---------------------------------------------------------------------------
# Exposure category → 2-char item code
# ---------------------------------------------------------------------------
exposure_item_codes:
  buildings: bd
  population: pp
  infrastructure: if
  agriculture: ag
  natural_environment: en
  economic_indicator: ec
  development_index: dv

# ---------------------------------------------------------------------------
# Organization abbreviation lookup
# Keys are slugified org names (lowercase, underscores).
# Values are short names (max 15 chars, lowercase).
#
# Resolution order in resolve_shortname():
#   1. Exact match on org slug
#   2. Exact match on slugified org display name
#   3. Fallback: auto-truncate slug to max_length
