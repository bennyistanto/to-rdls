# ---------------------------------------------------------------------------
# Country thresholds
# Datasets covering more than max_countries omit ISO3 from the filename
# ---------------------------------------------------------------------------
countries:
  max_countries: 5

# ---------------------------------------------------------------------------
# Org short-name truncation
# When the org slug is not in the lookup, auto-truncate to max_length chars
# ---------------------------------------------------------------------------
shortname:
  max_length: 15

# ---------------------------------------------------------------------------
# Validation toggles
# require_he_for_vl: if true, V/L records must also have H or E to be named
# ---------------------------------------------------------------------------
validation:
  require_he_for_vl: false

# ---------------------------------------------------------------------------
# Collision handling
# If two records resolve to the same filename, append suffix_format
# ---------------------------------------------------------------------------
collision:
  suffix_format: "_{uuid8}"

# ---------------------------------------------------------------------------
# Title slug settings
# max_length : hard cap on the slug portion of the filename
# stop_words : removed during slugification (lowercase match)
# ---------------------------------------------------------------------------
title_slug:
  max_length: 25
  stop_words:
  - for
  - of
  - the
  - and
  - in
  - a
  - an
  - to
  - at
  - by
  - "on"
  - with
  - from

# ---------------------------------------------------------------------------
# ISO3 -> lowercase country name  (used to strip country from title slug)
