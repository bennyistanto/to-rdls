# ---------------------------------------------------------------------------
# Shortname settings
# ---------------------------------------------------------------------------
shortname:
  max_length: 15

# ---------------------------------------------------------------------------
# Component validation
# When false: V-only, L-only, V+L are valid combinations
# When true: V/L require H or E to be present
# ---------------------------------------------------------------------------
validation:
  require_he_for_vl: false

# ---------------------------------------------------------------------------
# Collision avoidance
# When duplicate stems are detected, append this suffix.
# {uuid8} is replaced with first 8 chars of source dataset UUID.
# ---------------------------------------------------------------------------
collision:
  suffix_format: "__{uuid8}"

# ---------------------------------------------------------------------------
# Title slug settings
# The title slug is a compact representation of the dataset title.
# Stop words, country names (from iso3_to_name), and org names are stripped
# before slugification. No separators — pure alphanumeric concatenation.
# ---------------------------------------------------------------------------
title_slug:
  max_length: 20
  stop_words:
    - "for"
    - "of"
    - "the"
    - "and"
    - "in"
    - "a"
    - "an"
    - "to"
    - "at"
    - "by"
    - "on"
    - "with"
    - "from"

# ---------------------------------------------------------------------------
# ISO3 → Country name mapping (for title slug stripping)
