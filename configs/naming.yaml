# =============================================================================
# RDLS Record Naming Convention Configuration
# =============================================================================
# Defines the structure of RDLS record IDs and JSON filenames:
#   rdls_{types}-{iso3}{org}_{titleslug}.json
#
# - types:     Component codes (single: hzd/exp/vln/lss, multi: h/e/v/l concat)
# - iso3:      Lowercase ISO3 codes concatenated (3-char fixed width, sorted);
#              omitted for regional/global datasets (>max_countries)
# - org:       Org abbreviation appended after ISO3 (from lookup or auto-truncate)
# - titleslug: Slugified dataset title (stop words + country + org removed, max 25)
# =============================================================================

# ---------------------------------------------------------------------------
# Component type encoding
# Single component  -> 3-letter code (hzd, exp, vln, lss)
# Multiple components -> single-letter concatenation in HEVL order
# ---------------------------------------------------------------------------
component_codes:
  single:
    hazard: hzd
    exposure: exp
    vulnerability: vln
    loss: lss
  letter:
    hazard: h
    exposure: e
    vulnerability: v
    loss: l
  order:
  - hazard
  - exposure
  - vulnerability
  - loss

# ---------------------------------------------------------------------------
# Hazard-item codes  (2-letter, used in future per-item naming)
# ---------------------------------------------------------------------------
hazard_item_codes:
  flood: fl
  earthquake: eq
  tsunami: ts
  strong_wind: tc
  volcanic: vo
  landslide: ls
  convective_storm: cs
  wildfire: wf
  drought: dr
  extreme_temperature: et
  coastal_flood: cf

# ---------------------------------------------------------------------------
# Exposure-item codes  (2-letter, used in future per-item naming)
# ---------------------------------------------------------------------------
exposure_item_codes:
  buildings: bd
  population: pp
  infrastructure: if
  agriculture: ag
  natural_environment: en
  economic_indicator: ec
  development_index: dv

