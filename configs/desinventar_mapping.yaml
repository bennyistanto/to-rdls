# DesInventar Event Type → RDLS v0.3 Hazard Mapping
# Used by rdls_desinventar_01_generate_records.py
#
# References:
#   - RDLS hazard_type codelist: coastal_flood, convective_storm, drought,
#     extreme_temperature, flood, wildfire, strong_wind, earthquake, landslide,
#     tsunami, volcanic
#   - RDLS process_type codelist: see schema rdls_schema_v0.3.json
#   - DesInventar data dictionary: datadictionary.docx

# ──────────────────────────────────────────────────────────────────────
# Event type → RDLS hazard_type + process_type
# null = not mappable to RDLS natural hazard codelist (skipped)
# ──────────────────────────────────────────────────────────────────────
event_type_mapping:
  # HIGH confidence — clear 1:1 mapping
  FLOOD:           { hazard_type: flood, process_type: fluvial_flood }
  FLASH FLOOD:     { hazard_type: flood, process_type: fluvial_flood }
  LANDSLIDE:       { hazard_type: landslide, process_type: landslide_general }
  EARTHQUAKE:      { hazard_type: earthquake, process_type: ground_motion }
  DROUGHT:         { hazard_type: drought, process_type: meteorological_drought }
  FOREST FIRE:     { hazard_type: wildfire, process_type: wildfire }
  AVALANCHE:       { hazard_type: landslide, process_type: snow_avalanche }
  SURGE:           { hazard_type: coastal_flood, process_type: storm_surge }
  HEAT WAVE:       { hazard_type: extreme_temperature, process_type: extreme_heat }
  COLD WAVE:       { hazard_type: extreme_temperature, process_type: extreme_cold }
  TSUNAMI:         { hazard_type: tsunami, process_type: tsunami }

  # MEDIUM confidence — reasonable mapping with some ambiguity
  RAINS:           { hazard_type: flood, process_type: pluvial_flood }
  STORM:           { hazard_type: strong_wind, process_type: extratropical_cyclone }
  WINDSTORM:       { hazard_type: strong_wind, process_type: extratropical_cyclone }
  SNOWSTORM:       { hazard_type: strong_wind, process_type: extratropical_cyclone }
  HAILSTORM:       { hazard_type: convective_storm, process_type: tornado }
  THUNDERSTORM:    { hazard_type: convective_storm, process_type: tornado }
  FROST:           { hazard_type: extreme_temperature, process_type: extreme_cold }
  FIRE:            { hazard_type: wildfire, process_type: wildfire }
  LIQUEFACTION:    { hazard_type: earthquake, process_type: liquefaction }
  SEDIMENTATION:   { hazard_type: landslide, process_type: landslide_mudflow }
  CYCLONE:         { hazard_type: strong_wind, process_type: tropical_cyclone }
  TYPHOON:         { hazard_type: strong_wind, process_type: tropical_cyclone }
  HURRICANE:       { hazard_type: strong_wind, process_type: tropical_cyclone }
  VOLCANIC ERUPTION: { hazard_type: volcanic, process_type: ashfall }
  VOLCANIC ACTIVITY: { hazard_type: volcanic, process_type: ashfall }
  MUDSLIDE:        { hazard_type: landslide, process_type: landslide_mudflow }
  ROCKSLIDE:       { hazard_type: landslide, process_type: landslide_rockslide }
  COASTAL FLOOD:   { hazard_type: coastal_flood, process_type: coastal_flood }
  TIDAL WAVE:      { hazard_type: coastal_flood, process_type: storm_surge }

  # NOT mappable to RDLS natural hazards (skipped)
  EPIDEMIC:        null
  PLAGUE:          null
  ACCIDENT:        null
  CONTAMINATION:   null
  STRUCTURE:       null
  EXPLOSION:       null
  LEAK:            null
  FOG:             null
  OTHER:           null
  PANIC:           null
  POLLUTION:       null
  BIOLOGICAL:      null
  FAMINE:          null

# ──────────────────────────────────────────────────────────────────────
# DesInventar loss columns → RDLS loss entry fields
# Each column from di_report-*.xls maps to impact_metric + asset fields
# ──────────────────────────────────────────────────────────────────────
loss_column_mapping:
  Deaths:
    impact_metric: casualty_count
    asset_category: population
    asset_dimension: population
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "deaths directly caused by disaster events"

  Injured:
    impact_metric: casualty_count
    asset_category: population
    asset_dimension: population
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "persons injured or made sick directly by disaster events"

  Missing:
    impact_metric: casualty_count
    asset_category: population
    asset_dimension: population
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "persons missing or unaccounted for after disaster events"

  Affected:
    impact_metric: exposure_to_hazard
    asset_category: population
    asset_dimension: population
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "persons indirectly affected (disruption to services, commerce, work)"

  Victims:
    impact_metric: exposure_to_hazard
    asset_category: population
    asset_dimension: population
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "persons whose goods/services suffered serious damage"

  Evacuated:
    impact_metric: displaced_count
    asset_category: population
    asset_dimension: population
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "persons temporarily evacuated from homes or workplaces"

  Relocated:
    impact_metric: displaced_count
    asset_category: population
    asset_dimension: population
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "persons permanently relocated from homes"

  Houses Destroyed:
    impact_metric: asset_loss
    asset_category: buildings
    asset_dimension: structure
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "homes destroyed beyond habitability"

  Houses Damaged:
    impact_metric: damage_ratio
    asset_category: buildings
    asset_dimension: structure
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "homes with non-structural damage, still habitable"

  Losses $USD:
    impact_metric: economic_loss_value
    asset_category: buildings
    asset_dimension: content
    quantity_kind: currency
    loss_type: ground_up
    currency: USD
    description_suffix: "total economic losses in US Dollars"

  Losses $Local:
    impact_metric: economic_loss_value
    asset_category: buildings
    asset_dimension: content
    quantity_kind: currency
    loss_type: ground_up
    description_suffix: "total economic losses in local currency"

  Damages in crops Ha.:
    impact_metric: asset_loss
    asset_category: agriculture
    asset_dimension: product
    quantity_kind: area
    loss_type: ground_up
    description_suffix: "hectares of crops/woods destroyed or affected"

  Lost Cattle:
    impact_metric: asset_loss
    asset_category: agriculture
    asset_dimension: product
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "livestock lost"

  Education centers:
    impact_metric: asset_loss
    asset_category: infrastructure
    asset_dimension: structure
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "educational facilities destroyed or affected"

  Hospitals:
    impact_metric: asset_loss
    asset_category: infrastructure
    asset_dimension: structure
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "health facilities destroyed or affected"

  Damages in roads Mts:
    impact_metric: asset_loss
    asset_category: infrastructure
    asset_dimension: structure
    quantity_kind: count
    loss_type: ground_up
    description_suffix: "metres of transport networks destroyed"

# ──────────────────────────────────────────────────────────────────────
# Country ISO3 → local currency (ISO 4217)
# Used for "Losses $Local" column
# ──────────────────────────────────────────────────────────────────────
