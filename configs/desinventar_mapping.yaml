  ALB: ALL    # Albanian Lek
  KHM: KHR   # Cambodian Riel
  COL: COP   # Colombian Peso
  CRI: CRC   # Costa Rican Colón
  ETH: ETB   # Ethiopian Birr
  IDN: IDR   # Indonesian Rupiah
  KEN: KES   # Kenyan Shilling
  MDG: MGA   # Malagasy Ariary
  MLI: XOF   # West African CFA Franc
  NER: XOF   # West African CFA Franc
  SEN: XOF   # West African CFA Franc
  LKA: LKR   # Sri Lankan Rupee
  TGO: XOF   # West African CFA Franc

