      - '[/\\](?:Backup|backup)[/\\]'
      # Lock / error files from SharePoint or concurrent access
      - '\.sr\.lock'
      - '\.lock$'
      - '_Error\.txt$'
      - '\.access$'
      # Reclassified intermediates
      - '[/\\]reclassified[/\\]'
      # InundationMaps PNG exports (visualisation, not data)
