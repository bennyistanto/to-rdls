      - '.r03'
      - '.r04'
      - '.f01'
      - '.f02'
      - '.x01'
      - '.x02'
      - '.x03'
      - '.x04'
      - '.u01'
      - '.u02'
      - '.hdf'
      - '.tmp.hdf'
      - '.blf'
      - '.ic'
      - '.dss'
      - '.rst'
      - '.rasmap'
      - '.rasmap.backup'
