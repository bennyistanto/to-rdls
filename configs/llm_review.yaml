# LLM-First HDX v1.0 Classification Pipeline Configuration
# Used by: notebooks/rdls_hdx_v10.py
# Maps to: src.llm_classify_v10.V10Config.from_yaml()
version: "1.0"

# CKAN column cache (pre-populated, no live API calls during pipeline)
ckan:
  cache_dir: "output/hdx/column_cache"
  max_resources_per_dataset: 10

# LLM classification settings
llm:
  model: "claude-haiku-4-5-20251001"
  temperature: 0.0
  max_tokens: 1800
  max_retries: 5
  timeout_seconds: 30.0
  rate_limit_delay: 0.3

  # Cost guardrails - pipeline aborts if exceeded
  max_cost_usd: 150.0           # Full 26,246 run ~$123; 150 gives buffer
  cost_per_mtok_input: 1.00     # Claude Haiku 4.5 pricing (USD/MTok)
  cost_per_mtok_output: 5.00

  # Separate from old output/hdx/llm_cache/ - new prompt, new cache
  cache_dir: "output/hdx/v1.0/cache"

# Prompt content limits
prompt:
  description_max_chars: 600
  methodology_max_chars: 300
  max_resources_shown: 20
  max_columns_shown: 50

# Output distribution
output:
  base_dir: "output/hdx/v1.0"
  # Sub-folders created automatically:
  #   dist/high/      - confidence >= confidence_high, schema-valid
  #   dist/medium/    - confidence >= confidence_medium, schema-valid
  #   dist/invalid/   - schema validation failed (any confidence)
  #   not_rdls/       - is_rdls: false from LLM
  #   reports/        - progress JSONL, summary CSV, cost log
  confidence_high: 0.7
  confidence_medium: 0.4

# Progress tracking (enables safe resumption after interruption)
progress:
  file: "output/hdx/v1.0/reports/progress.jsonl"
  save_every: 100               # write progress summary every N records
